<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .bg { fill: #f7f5ef; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52606d; }
      .node-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102a43; }
      .node-text { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334e68; }
      .small { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52606d; }
      .center { fill: #123c69; }
      .pkg-ai { fill: #d8f3dc; stroke: #40916c; }
      .pkg-agent { fill: #dbeafe; stroke: #3b82f6; }
      .pkg-coding { fill: #fff3bf; stroke: #f08c00; }
      .pkg-tui { fill: #fde2e4; stroke: #d6336c; }
      .pkg-orch { fill: #e9d8fd; stroke: #8b5cf6; }
      .ops { fill: #e2e8f0; stroke: #64748b; }
      .line { fill: none; stroke: #7b8794; stroke-width: 2.2; }
      .arrow { fill: #7b8794; }
      .card { rx: 16; ry: 16; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" class="arrow"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="980"/>

  <text x="700" y="58" text-anchor="middle" class="title">Pi Agent Harness 项目思维导图</text>
  <text x="700" y="86" text-anchor="middle" class="subtitle">自扩展终端 Coding Agent：统一 LLM API + Agent Loop + TUI + CLI/SDK</text>

  <rect x="520" y="160" width="360" height="150" rx="22" ry="22" class="center"/>
  <text x="700" y="205" text-anchor="middle" style="font:700 27px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:white;">Pi Monorepo</text>
  <text x="700" y="236" text-anchor="middle" style="font:400 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#d9e2ec;">npm workspaces / TypeScript ESM / Node 22+</text>
  <text x="700" y="265" text-anchor="middle" style="font:400 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#d9e2ec;">面向终端编程代理、模型抽象、扩展生态</text>

  <path d="M520 235 C430 210 350 184 270 150" class="line" marker-end="url(#arrow)"/>
  <path d="M520 300 C430 375 350 424 270 470" class="line" marker-end="url(#arrow)"/>
  <path d="M880 235 C980 205 1070 180 1160 150" class="line" marker-end="url(#arrow)"/>
  <path d="M880 300 C980 380 1070 425 1160 470" class="line" marker-end="url(#arrow)"/>
  <path d="M700 310 C700 385 700 430 700 470" class="line" marker-end="url(#arrow)"/>
  <path d="M700 160 C700 128 700 118 700 112" class="line"/>

  <rect x="70" y="115" width="400" height="230" class="card pkg-ai"/>
  <text x="95" y="155" class="node-title">packages/ai</text>
  <text x="95" y="184" class="node-text">统一多 Provider LLM API</text>
  <text x="115" y="217" class="node-text">• 模型注册与查询</text>
  <text x="115" y="244" class="node-text">• API Key / OAuth 认证</text>
  <text x="115" y="271" class="node-text">• Streaming / tool calling / usage</text>
  <text x="115" y="298" class="node-text">• 图片输入与图片生成</text>
  <text x="95" y="326" class="small">关键目录：src/api, src/providers, src/auth, src/utils</text>

  <rect x="930" y="115" width="400" height="230" class="card pkg-agent"/>
  <text x="955" y="155" class="node-title">packages/agent</text>
  <text x="955" y="184" class="node-text">Agent 运行时核心</text>
  <text x="975" y="217" class="node-text">• Agent class / agentLoop 事件流</text>
  <text x="975" y="244" class="node-text">• 上下文转换与裁剪入口</text>
  <text x="975" y="271" class="node-text">• 工具调用、校验、执行结果回写</text>
  <text x="975" y="298" class="node-text">• agent_start → turns → agent_end</text>
  <text x="955" y="326" class="small">关键文件：agent-loop.ts, agent.ts, harness/*</text>

  <rect x="500" y="470" width="400" height="270" class="card pkg-coding"/>
  <text x="525" y="510" class="node-title">packages/coding-agent</text>
  <text x="525" y="539" class="node-text">用户实际使用的 pi CLI + SDK</text>
  <text x="545" y="572" class="node-text">• CLI：interactive / print / json / rpc</text>
  <text x="545" y="599" class="node-text">• Core：AgentSession / SessionManager</text>
  <text x="545" y="626" class="node-text">• 内置工具：read / write / edit / bash / grep</text>
  <text x="545" y="653" class="node-text">• 扩展：skills / prompt templates / themes</text>
  <text x="545" y="680" class="node-text">• 会话：resume / fork / tree / compact / export</text>
  <text x="525" y="716" class="small">关键目录：src/cli, src/core, src/modes, src/utils</text>

  <rect x="70" y="430" width="400" height="230" class="card pkg-tui"/>
  <text x="95" y="470" class="node-title">packages/tui</text>
  <text x="95" y="499" class="node-text">终端 UI 框架</text>
  <text x="115" y="532" class="node-text">• Differential rendering</text>
  <text x="115" y="559" class="node-text">• Editor / Input / Markdown / Image</text>
  <text x="115" y="586" class="node-text">• Overlay / Focus / IME 支持</text>
  <text x="115" y="613" class="node-text">• 终端图片与主题组件</text>
  <text x="95" y="642" class="small">关键目录：src/components, tui.ts, terminal.ts</text>

  <rect x="930" y="430" width="400" height="230" class="card pkg-orch"/>
  <text x="955" y="470" class="node-title">packages/orchestrator</text>
  <text x="955" y="499" class="node-text">实验性上层调度包</text>
  <text x="975" y="532" class="node-text">• 进程/RPC 调度</text>
  <text x="975" y="559" class="node-text">• IPC server/client/protocol</text>
  <text x="975" y="586" class="node-text">• supervisor / serve / handler</text>
  <text x="975" y="613" class="node-text">• 当前 API 不稳定</text>
  <text x="955" y="642" class="small">关键目录：src/ipc, supervisor.ts, cli.ts</text>

  <path d="M470 230 C575 245 650 350 680 470" class="line" marker-end="url(#arrow)"/>
  <path d="M930 230 C825 245 750 350 720 470" class="line" marker-end="url(#arrow)"/>
  <path d="M470 545 C485 565 492 575 500 590" class="line" marker-end="url(#arrow)"/>
  <path d="M900 590 C930 580 930 570 930 555" class="line" marker-end="url(#arrow)"/>

  <rect x="100" y="770" width="365" height="145" class="card ops"/>
  <text x="125" y="810" class="node-title">开发链路</text>
  <text x="145" y="843" class="node-text">• npm install --ignore-scripts</text>
  <text x="145" y="870" class="node-text">• npm run check</text>
  <text x="145" y="897" class="node-text">• ./test.sh / 指定 vitest</text>

  <rect x="520" y="770" width="360" height="145" class="card ops"/>
  <text x="545" y="810" class="node-title">质量与供应链</text>
  <text x="565" y="843" class="node-text">• Biome + tsgo</text>
  <text x="565" y="870" class="node-text">• pinned direct deps</text>
  <text x="565" y="897" class="node-text">• shrinkwrap / lockfile checks</text>

  <rect x="935" y="770" width="365" height="145" class="card ops"/>
  <text x="960" y="810" class="node-title">发布链路</text>
  <text x="980" y="843" class="node-text">• release:local smoke test</text>
  <text x="980" y="870" class="node-text">• release:patch / release:minor</text>
  <text x="980" y="897" class="node-text">• tag 触发 CI trusted publishing</text>

  <path d="M590 740 C520 765 460 790 465 835" class="line" marker-end="url(#arrow)"/>
  <path d="M700 740 L700 770" class="line" marker-end="url(#arrow)"/>
  <path d="M810 740 C885 765 930 790 935 835" class="line" marker-end="url(#arrow)"/>

  <text x="700" y="950" text-anchor="middle" class="small">依赖方向：agent 基于 ai；coding-agent 直接组合 ai / agent / tui；orchestrator 位于 coding-agent 之上做实验性调度。</text>
</svg>
